<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpotApply for Recruiters — Verified Talent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
        --canvas: #F4F1EA; --surface: #FCFAF5; --surface-2: #EFEADF;
        --ink: #2E2A24; --ink-soft: #4A453C; --muted: #6E675C; --border: #E6E0D3;
        --sage: #2FB4A6; --sage-600: #1F9C8F; --sage-700: #16847A; --sage-tint: #E7F5F2;
    }
    body {
        font-family: 'Outfit', sans-serif;
        background: var(--canvas);
        color: var(--ink);
        min-height: 100vh;
        position: relative;
    }
    /* Soft sage wash background */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 80% 50% at 20% -10%, rgba(47,180,166,0.08) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 80% 10%, rgba(31,156,143,0.06) 0%, transparent 55%),
            radial-gradient(ellipse 50% 60% at 50% 100%, rgba(22,132,122,0.04) 0%, transparent 50%);
        pointer-events: none;
        z-index: -1;
    }
    .glass {
        background: var(--surface);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid var(--border);
        border-radius: 20px;
        box-shadow: 0 1px 3px rgba(46,42,36,0.06);
    }
    .inp {
        width: 100%;
        background: #FFFFFF;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 14px;
        color: var(--ink);
        font-size: 13px;
        transition: all 0.2s ease;
    }
    .inp::placeholder { color: var(--muted); }
    .inp:focus {
        outline: none;
        border-color: var(--sage);
        background: #FFFFFF;
        box-shadow: 0 0 0 3px rgba(47,180,166,0.15);
    }
    .gradient-text {
        background: linear-gradient(135deg, var(--sage) 0%, var(--sage-700) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .t-ink { color: var(--ink); }
    .t-soft { color: var(--ink-soft); }
    .t-muted { color: var(--muted); }
    .t-sage { color: var(--sage-700); }
    .hov-sage:hover { border-color: var(--sage); }
    .chip-sage { background: var(--sage-tint); color: var(--sage-700); border-color: rgba(47,180,166,0.35); }
  </style>
</head>
<body class="min-h-screen pb-12">
  <div class="max-w-4xl mx-auto px-5 py-10 relative z-10">
    <div class="flex items-center justify-between mb-2">
      <h1 class="text-3xl font-black gradient-text">SpotApply for Recruiters</h1>
      <a href="/messages" class="text-sm font-bold text-emerald-700 hover:text-emerald-800 transition flex items-center gap-1.5 px-4 py-2 rounded-full border border-emerald-200 bg-emerald-50 hover:bg-emerald-100">💬 Messages</a>
    </div>
    <p class="t-muted text-sm mb-8">Search a pool of <b>verified</b> candidates — evidence-backed, no resume spam.</p>

    <div id="need-login" class="hidden glass p-8 text-center">
      <p class="t-soft text-sm">Please <a href="/login" class="text-emerald-700 hover:underline font-bold">log in</a> to use the recruiter portal.</p>
    </div>

    <div id="portal" class="hidden space-y-6">
      <!-- Registration / verification -->
      <div class="glass p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xs font-black uppercase tracking-widest t-sage">Your Recruiter Account</h2>
          <span id="verify-badge" class="text-[11px] font-black px-3.5 py-1 rounded-full transition-all duration-300" style="background:var(--surface-2);color:var(--muted);border:1px solid var(--border);">Unverified</span>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input id="r-name" class="inp" placeholder="Full name" />
          <input id="r-title" class="inp" placeholder="Title (e.g. Senior Recruiter)" />
          <input id="r-email" class="inp" placeholder="Work email (corporate)" />
          <input id="r-company" class="inp" placeholder="Company name" />
          <input id="r-domain" class="inp" placeholder="Company domain (acme.com)" />
          <input id="r-spec" class="inp" placeholder="Specialties (Python, ML, ...)" />
        </div>
        <button onclick="registerRecruiter()" class="mt-4 text-xs font-black uppercase tracking-wider text-white rounded-xl px-6 py-3 transition hover:scale-[1.02] active:scale-[0.98] shadow-md hover:shadow-lg hover:shadow-teal-500/20" style="background:var(--sage-700);">Save & verify</button>
        <p id="verify-notes" class="text-[11px] t-muted mt-3"></p>
      </div>

      <!-- Reverse search -->
      <div class="glass p-6">
        <h2 class="text-xs font-black uppercase tracking-widest t-sage mb-4">🔎 Reverse Search — paste a job description</h2>
        <textarea id="jd" rows="5" class="inp" placeholder="Paste the role / job description here..."></textarea>
        <button onclick="searchCandidates()" class="mt-4 text-xs font-black uppercase tracking-wider text-white rounded-xl px-6 py-3 transition hover:scale-[1.02] active:scale-[0.98] shadow-md hover:shadow-lg hover:shadow-teal-500/20" style="background:var(--sage-700);">Find verified candidates</button>
      </div>

      <div id="results" class="space-y-4"></div>
    </div>
  </div>

<script>
  const token = localStorage.getItem('sb_token');
  const hdrs = token ? { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' } : { 'Content-Type': 'application/json' };
  if (!token) { document.getElementById('need-login').classList.remove('hidden'); }
  else { document.getElementById('portal').classList.remove('hidden'); }

  const $ = (id) => document.getElementById(id);
  async function registerRecruiter() {
    const body = {
      full_name: $('r-name').value, title: $('r-title').value, work_email: $('r-email').value,
      company_name: $('r-company').value, company_domain: $('r-domain').value, specialties: $('r-spec').value,
    };
    const res = await fetch('/api/recruiter/register', { method:'POST', headers:hdrs, body: JSON.stringify(body) });
    if (!res.ok) { document.getElementById('verify-notes').textContent = 'Could not save.'; return; }
    const d = await res.json();
    const b = document.getElementById('verify-badge');
    if (d.banned) { b.textContent = 'Banned'; b.style.background='#FEE2E2'; b.style.color='#B91C1C'; b.style.borderColor='rgba(239,68,68,0.3)'; }
    else if (d.verified) { b.textContent = '✓ Verified'; b.style.background='rgba(16,185,129,0.12)'; b.style.color='#047857'; b.style.borderColor='rgba(16,185,129,0.35)'; }
    else { b.textContent = 'Unverified'; }
    document.getElementById('verify-notes').textContent = (d.notes || '') + (d.h1b_filings ? ` · ${d.h1b_filings} H-1B filings` : '');
  }

  async function searchCandidates() {
    const res = await fetch('/api/recruiter/search', { method:'POST', headers:hdrs, body: JSON.stringify({ job_description: document.getElementById('jd').value }) });
    const box = document.getElementById('results');
    if (res.status === 403) { box.innerHTML = '<div class="glass p-5 text-amber-700 text-sm border border-amber-300">Verify your recruiter account first.</div>'; return; }
    if (!res.ok) { box.innerHTML = '<div class="glass p-5 text-rose-600 text-sm border border-rose-300">Search failed.</div>'; return; }
    const d = await res.json();
    if (!d.results.length) { box.innerHTML = '<div class="glass p-5 t-muted text-sm">No verified candidates match yet.</div>'; return; }
    const esc = v => String(v == null ? '' : v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    box.innerHTML = d.results.map(c => `
      <div class="glass p-5 flex flex-col md:flex-row md:items-center justify-between gap-4 hov-sage transition">
        <div class="min-w-0">
          <div class="flex flex-wrap items-center gap-2">
            <span class="font-extrabold t-ink text-base">${esc(c.name)}</span>
            ${c.tier ? `<span class="text-[10px] font-black px-2.5 py-0.5 rounded-full border" style="background:rgba(16,185,129,0.12);color:#047857;border-color:rgba(16,185,129,0.35)">✓ ${esc(c.tier)}</span>` : ''}
            <span class="text-[11px] chip-sage font-bold px-2 py-0.5 rounded-full border">${c.match}% match</span>
            ${c.rating ? `<span class="text-[11px] text-amber-600 font-bold flex items-center gap-0.5">★ ${c.rating}</span>` : ''}
          </div>
          <div class="text-[12px] t-muted mt-1.5 flex flex-wrap gap-x-2 gap-y-1 font-medium">
            <span>${esc(c.title || '')}</span>
            ${c.availability ? `<span class="t-muted">•</span> <span class="t-ink">${esc(c.availability)}</span>` : ''}
            ${c.work_auth ? `<span class="t-muted">•</span> <span class="t-ink">${esc(c.work_auth)}</span>` : ''}
            ${c.needs_sponsorship ? `<span class="t-muted">•</span> <span class="text-rose-600 font-semibold">needs sponsorship</span>` : ''}
          </div>
          <div class="text-[11px] t-muted mt-2 font-mono">${esc((c.skills||[]).join(' · '))}</div>
        </div>
        <div class="flex items-center gap-3 shrink-0 mt-2 md:mt-0">
          ${c.share_url ? `<a href="${esc(c.share_url)}" target="_blank" class="text-xs font-bold text-emerald-700 hover:text-emerald-800 hover:underline transition">View Profile ↗</a>` : ''}
          <button onclick='requestIntro("${esc(c.candidate_user_id)}", this)' class="text-xs font-bold text-white rounded-xl px-4 py-2 hover:scale-[1.02] active:scale-[0.98] transition shadow" style="background:var(--sage-700);">Request Intro</button>
        </div>
      </div>`).join('');
  }

  async function requestIntro(candidateId, btn) {
    btn.disabled = true; btn.textContent = '...';
    const res = await fetch('/api/recruiter/intro', { method:'POST', headers:hdrs, body: JSON.stringify({ candidate_user_id: candidateId, job_context: document.getElementById('jd').value.slice(0,200) }) });
    if (res.ok) { const d = await res.json(); btn.textContent = d.status === 'accepted' ? '✓ Accepted' : '✓ Requested'; btn.style.background = '#047857'; }
    else { btn.textContent = 'Failed'; btn.disabled = false; }
  }
</script>
</body>
</html>
