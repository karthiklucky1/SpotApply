<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HirePath — Signing in...</title>
    <style>
        body { font-family: sans-serif; background: #020617; color: #f8fafc; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    </style>
</head>
<body>
    <p>Signing you in...</p>
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm'
        const sb = createClient('{{ supabase_url }}', '{{ supabase_anon_key }}')
        
        let redirected = false;
        
        sb.auth.onAuthStateChange(async (event, session) => {
            if (session && !redirected) {
                redirected = true;
                localStorage.setItem('sb_token', session.access_token)
                // Cookie so the server-rendered /dashboard can authenticate this
                // navigation (browser sends no Authorization header on page loads).
                {
                    const _secure = location.protocol === 'https:' ? '; Secure' : '';
                    document.cookie = 'sb_token=' + session.access_token + '; path=/; max-age=3600; SameSite=Lax' + _secure;
                }

                // Bootstrap profile from Google metadata
                const meta = session.user.user_metadata || {}
                const name = meta.full_name || meta.name || '';
                const parts = name.split(' ');
                
                try {
                    await fetch('/api/profile', {
                        method: 'PUT',
                        headers: { 
                            'Content-Type': 'application/json', 
                            'Authorization': `Bearer ${session.access_token}` 
                        },
                        body: JSON.stringify({ 
                            first_name: parts[0] || '', 
                            last_name: parts.slice(1).join(' ') || '', 
                            email: session.user.email || '' 
                        })
                    });
                } catch(e) {
                    console.error("Error bootstrapping profile:", e);
                }
                
                window.location.href = '/dashboard'
            } else if (event === 'INITIAL_SESSION' && !session && !redirected) {
                // Allow a small delay for URL hash parsing to finish in case it's in progress
                setTimeout(() => {
                    if (!redirected) {
                        window.location.href = '/login'
                    }
                }, 1000);
            }
        })
    </script>
</body>
</html>
